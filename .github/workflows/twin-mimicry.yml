name: Twin Mimicry
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  mimic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Twin Mimicry
        run: npx tsx src/lib/twin-mimicry.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit reports
        run: |
          git config user.name "Twin Mimicry Bot"
          git config user.email "bot@council-app.com"
          git add data/reports/twin-mimicry.md
          git commit -m "👥 Twin Mimicry: Elite developer analysis" || echo "No changes"
          git push
